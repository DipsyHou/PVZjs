<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>关卡准备</title>
  <link rel="stylesheet" href="../css/pvz.css" />
  <link rel="stylesheet" href="../css/level_setup.css" />
</head>
<body>
  <h2>关卡准备</h2>
  <div class="panel">
    <h3>选择植物 <span id="deck-count" style="font-size:14px;color:#666;font-weight:normal"></span></h3>
    <div id="plants-choose" class="grid"></div>
  </div>

  <div class="panel">
    <h3>选择地图</h3>
    <div id="maps" class="grid">
      <div class="map-item" data-map="level1">草地 - Level 1</div>
      <div class="map-item" data-map="park_1">公园 - level 1</div>
      <div class="map-item" data-map="park_2">公园 - level 2</div>
      <div class="map-item" data-map="park_3">公园 - level 3</div>
      <div class="map-item" data-map="park_4">公园 - 终极</div>
    </div>
  </div>

  <div class="panel">
    <h3>选择模式</h3>
    <div id="modes">
      <div class="mode-item" data-mode="normal">普通</div>
      <div class="mode-item" data-mode="hard">困难</div>
      <div class="mode-item" data-mode="endless">无尽</div>
    </div>
  </div>

  <div style="margin-top:12px">
    <button id="start-btn">开始游戏</button>
  </div>

  <script src="../js/constants.js"></script>
  <script src="../js/assets.js"></script>
  <script src="../js/level_setup.js"></script>
</body>
</html>
