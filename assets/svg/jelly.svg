  <!-- Inner Highlight -->
  <ellipse cx="20" cy="35" rx="8" ry="5" transform="rotate(-30 20 35)" fill="#E1F5FE" fill-opacity="0.6"/>
  
  <!-- Face -->
  <circle cx="28" cy="50" r="4" fill="#01579B"/>
  <circle cx="52" cy="50" r="4" fill="#01579B"/>
  <path d="M35,60 Q40,65 45,60" stroke="#01579B" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Blueberry Decoration -->
  <!-- Leaf-shaped stem decoration -->
  <path d="M36,12 C30,12 30,20 38,22 C46,20 46,12 40,14 Z" fill="#2E7D32" stroke="#1B5E20" stroke-width="0.8"/>
  <!-- Berry -->
