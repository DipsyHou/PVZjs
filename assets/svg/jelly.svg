<svg width="80" height="80" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
  <!-- Base/Shadow -->
  <ellipse cx="40" cy="75" rx="35" ry="5" fill="#000" fill-opacity="0.2"/>

  <!-- Jelly Body: Larger, filling more space -->
