<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Pumpkin Body (Shell) -->
  <!-- Main orange body, low and wide -->
  <ellipse cx="50" cy="65" rx="48" ry="30" fill="#d35400" stroke="#a04000" stroke-width="3"/>
  <ellipse cx="50" cy="65" rx="38" ry="30" fill="#e67e22" stroke="#a04000" stroke-width="2"/>
  <ellipse cx="50" cy="65" rx="28" ry="30" fill="#f39c12" stroke="#a04000" stroke-width="2"/>
  
  <!-- Opening for plant inside - dark brown -->
  <ellipse cx="50" cy="55" rx="35" ry="15" fill="#5d4037" stroke="#3e2723" stroke-width="2"/>

  <!-- Spikes - Grey triangles -->
  <path d="M5 60 L-5 50 L10 50 Z" fill="#bdc3c7" stroke="#7f8c8d" />
  <path d="M95 60 L105 50 L90 50 Z" fill="#bdc3c7" stroke="#7f8c8d" />
  <path d="M25 90 L30 100 L35 90 Z" fill="#bdc3c7" stroke="#7f8c8d" />
  <path d="M75 90 L70 100 L65 90 Z" fill="#bdc3c7" stroke="#7f8c8d" />
  <path d="M15 40 L10 30 L20 35 Z" fill="#bdc3c7" stroke="#7f8c8d" />
  <path d="M85 40 L90 30 L80 35 Z" fill="#bdc3c7" stroke="#7f8c8d" />

  <!-- Face -->
  <circle cx="35" cy="75" r="4" fill="#ffff00" />
  <circle cx="65" cy="75" r="4" fill="#ffff00" />
  <path d="M40 85 Q50 95 60 85" stroke="#ffff00" stroke-width="3" fill="none"/>
</svg>