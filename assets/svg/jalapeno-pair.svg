<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="fireGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffeb3b" stop-opacity="0.6"/>
      <stop offset="70%" stop-color="#ff9800" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#f44336" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <!-- Background Aura -->
  <circle cx="50" cy="50" r="48" fill="url(#fireGrad)" />

  <!-- Common Jalapeno Shape Definition -->
  <symbol id="jalapeno" viewBox="0 0 60 100">
    <!-- Body: Tapered red pepper -->
    <path d="M15 15 Q30 5 45 15 Q55 25 50 60 Q45 95 30 98 Q15 95 10 60 Q5 25 15 15 Z" fill="#d32f2f" stroke="#b71c1c" stroke-width="2"/>
    
    <!-- Stem -->
    <path d="M22 16 Q30 10 38 16 L36 8 Q30 2 24 8 Z" fill="#388e3c" stroke="#1b5e20" stroke-width="1"/>
    <path d="M30 8 Q32 0 35 -5" fill="none" stroke="#388e3c" stroke-width="3" stroke-linecap="round"/>

    <!-- Face -->
    <g transform="translate(0, 5)">
      <!-- Left Eye -->
      <ellipse cx="22" cy="35" rx="6" ry="7" fill="#fff" transform="rotate(15 22 35)"/>
      <circle cx="23" cy="35" r="1.5" fill="#000"/>
      <!-- Right Eye -->
      <ellipse cx="38" cy="35" rx="6" ry="7" fill="#fff" transform="rotate(-15 38 35)"/>
      <circle cx="37" cy="35" r="1.5" fill="#000"/>
      
      <!-- Eyebrows -->
      <path d="M15 28 L28 32" stroke="#000" stroke-width="2" stroke-linecap="round"/>
      <path d="M45 28 L32 32" stroke="#000" stroke-width="2" stroke-linecap="round"/>

      <!-- Mouth (Gritted Teeth) -->
      <path d="M20 55 Q30 58 40 55 Q40 65 30 68 Q20 65 20 55 Z" fill="#fff" stroke="#000" stroke-width="1"/>
      <path d="M20 55 Q30 58 40 55" fill="none" stroke="#000" stroke-width="1"/>
      <path d="M25 56 L25 64" stroke="#000" stroke-width="1"/>
      <path d="M30 57 L30 66" stroke="#000" stroke-width="1"/>
      <path d="M35 56 L35 64" stroke="#000" stroke-width="1"/>
    </g>
  </symbol>

  <!-- Instance 1: Back Left -->
  <use href="#jalapeno" x="5" y="5" width="60" height="90" transform="rotate(-10 35 50)"/>

  <!-- Instance 2: Front Right -->
  <use href="#jalapeno" x="35" y="10" width="60" height="90" transform="rotate(10 65 55)"/>

</svg>
