<svg width="80" height="80" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg" opacity="0.6">
  <defs>
    <linearGradient id="metal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#cfd8dc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#90a4ae;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Outer Casing -->
  <circle cx="40" cy="40" r="38" fill="url(#metal)" stroke="#546E7A" stroke-width="2"/>
  <circle cx="40" cy="40" r="30" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/>
  
  <!-- Clock Face Markings -->
  <line x1="40" y1="15" x2="40" y2="20" stroke="#2196F3" stroke-width="2"/>
  <line x1="40" y1="65" x2="40" y2="60" stroke="#2196F3" stroke-width="2"/>
  <line x1="15" y1="40" x2="20" y2="40" stroke="#2196F3" stroke-width="2"/>
  <line x1="65" y1="40" x2="60" y2="40" stroke="#2196F3" stroke-width="2"/>
  
  <!-- Hands (Counter-Clockwise) -->
  <g transform="rotate(-45 40 40)">
      <line x1="40" y1="40" x2="40" y2="22" stroke="#37474F" stroke-width="3" stroke-linecap="round"/>
      <line x1="40" y1="40" x2="52" y2="40" stroke="#37474F" stroke-width="3" stroke-linecap="round"/>
      <circle cx="40" cy="40" r="3" fill="#37474F"/>
  </g>
  
  <!-- Reverse Arrow -->
  <path d="M 25 25 Q 10 40 25 55" stroke="#FF5722" stroke-width="3" fill="none" marker-end="url(#arrowRed)"/>
  
  <!-- Digital Glitch Effect -->
  <rect x="50" y="20" width="10" height="2" fill="#2196F3" opacity="0.6"/>
  <rect x="55" y="25" width="8" height="2" fill="#2196F3" opacity="0.4"/>
</svg>